<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palabra Visitatore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; padding: 24px; background: #ecfdf5; color: #172033; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    main { max-width: 860px; margin: 0 auto; display: grid; gap: 18px; }
    .panel { background: #fff; border: 1px solid #bbf7d0; border-radius: 8px; padding: 18px; box-shadow: 0 12px 32px rgba(22, 101, 52, 0.08); }
    h1 { font-size: 26px; }
    label { display: grid; gap: 6px; color: #4b5563; font-size: 13px; font-weight: 650; }
    select { min-height: 42px; padding: 9px 11px; border: 1px solid #86efac; border-radius: 6px; background: #fff; color: #111827; font: inherit; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button { min-height: 42px; padding: 0 16px; border: 0; border-radius: 6px; cursor: pointer; font: inherit; font-weight: 750; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .primary { background: #16a34a; color: #fff; }
    .danger { background: #dc2626; color: #fff; }
    .secondary { background: #dcfce7; color: #166534; }
    .status { margin-top: 14px; padding: 11px 12px; border-radius: 6px; background: #f3f4f6; color: #4b5563; font-weight: 650; }
    .status.live { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .meters { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 14px; }
    .meter { padding: 12px; border-radius: 8px; background: #f0fdf4; border: 1px solid #bbf7d0; }
    .meter span { display: block; color: #166534; font-size: 12px; text-transform: uppercase; margin-bottom: 4px; }
    .meter strong { font-size: 18px; color: #0f172a; }
    .log { height: 260px; overflow: auto; padding: 12px; border-radius: 8px; background: #0f172a; color: #dbeafe; font-family: Consolas, "Courier New", monospace; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
    @media (max-width: 820px) { body { padding: 16px; } .meters { grid-template-columns: 1fr; } .controls { flex-direction: column; } button { width: 100%; } }
  </style>
</head>
<body>
  <main>
    <h1>Palabra Visitatore</h1>
    <section class="panel">
      <label>Cuffie output<select id="speakerDevice"><option value="">Default sistema</option></select></label>
      <div class="controls">
        <button class="primary" id="connectBtn">Collegati</button>
        <button class="danger" id="disconnectBtn" disabled>Disconnetti</button>
        <button class="secondary" id="refreshBtn">Aggiorna dispositivi</button>
        <button class="secondary" id="testBtn">Prova cuffie</button>
      </div>
      <div class="status" id="status">Pronto</div>
      <div class="meters">
        <div class="meter"><span>Audio chunks</span><strong id="audioChunks">0</strong></div>
        <div class="meter"><span>Buffer audio</span><strong id="audioBuffer">0 ms</strong></div>
        <div class="meter"><span>Visitatori</span><strong id="visitors">0</strong></div>
      </div>
    </section>
    <section class="panel"><div class="log" id="log"></div></section>
  </main>

  <script>
    const els = {
      speakerDevice: document.getElementById('speakerDevice'),
      connectBtn: document.getElementById('connectBtn'),
      disconnectBtn: document.getElementById('disconnectBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
      testBtn: document.getElementById('testBtn'),
      status: document.getElementById('status'),
      audioChunks: document.getElementById('audioChunks'),
      audioBuffer: document.getElementById('audioBuffer'),
      visitors: document.getElementById('visitors'),
      log: document.getElementById('log')
    };
    let ws = null, outputContext = null, outputGain = null, nextPlaybackTime = 0, audioChunks = 0;
    function setStatus(text, cls = '') { els.status.textContent = text; els.status.className = 'status' + (cls ? ' ' + cls : ''); }
    function log(message, data = null) { const now = new Date().toLocaleTimeString(); els.log.textContent = `${now} ${message}${data ? '\n' + JSON.stringify(data, null, 2) : ''}\n\n` + els.log.textContent; }
    async function refreshOutputs(requestPermission = false) {
      if (requestPermission) { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); stream.getTracks().forEach(t => t.stop()); }
      const devices = await navigator.mediaDevices.enumerateDevices();
      const current = els.speakerDevice.value;
      els.speakerDevice.innerHTML = '<option value="">Default sistema</option>';
      devices.filter(d => d.kind === 'audiooutput').forEach((d, i) => {
        const opt = document.createElement('option'); opt.value = d.deviceId; opt.textContent = d.label || `Output ${i + 1}`; els.speakerDevice.appendChild(opt);
      });
      if ([...els.speakerDevice.options].some(o => o.value === current)) els.speakerDevice.value = current;
      log('Output aggiornati', { count: els.speakerDevice.options.length - 1, outputSelectionSupported: typeof AudioContext.prototype.setSinkId === 'function' });
    }
    async function applyOutputDevice() {
      if (!outputContext || !els.speakerDevice.value) return;
      if (typeof outputContext.setSinkId !== 'function') { log('Selezione cuffie non supportata'); return; }
      await outputContext.setSinkId(els.speakerDevice.value);
      log('Output selezionato', { deviceId: els.speakerDevice.value });
    }
    function createToneBuffer(context) {
      const duration = 0.45, buffer = context.createBuffer(1, Math.floor(context.sampleRate * duration), context.sampleRate), data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) { const env = Math.min(1, i / 2000, (data.length - i) / 2000); data[i] = Math.sin(2 * Math.PI * 880 * i / context.sampleRate) * 0.25 * env; }
      return buffer;
    }
    async function testOutput() {
      outputContext = outputContext || new AudioContext({ sampleRate: 24000 });
      await outputContext.resume(); await applyOutputDevice();
      const source = outputContext.createBufferSource(); source.buffer = createToneBuffer(outputContext); source.connect(outputContext.destination); source.start();
      log('Tono test inviato');
    }
    function pcm16ToFloat32(arrayBuffer) {
      const view = new DataView(arrayBuffer), samples = new Float32Array(arrayBuffer.byteLength / 2);
      for (let i = 0; i < samples.length; i++) samples[i] = view.getInt16(i * 2, true) / 32768;
      return samples;
    }
    function scheduleAudio(arrayBuffer) {
      if (!outputContext || arrayBuffer.byteLength === 0) return;
      const samples = pcm16ToFloat32(arrayBuffer), audioBuffer = outputContext.createBuffer(1, samples.length, 24000);
      audioBuffer.copyToChannel(samples, 0);
      const source = outputContext.createBufferSource();
      source.buffer = audioBuffer; source.connect(outputGain || outputContext.destination);
      const now = outputContext.currentTime;
      nextPlaybackTime = Math.max(nextPlaybackTime, now + 0.08);
      source.start(nextPlaybackTime); nextPlaybackTime += audioBuffer.duration;
      audioChunks++; els.audioChunks.textContent = audioChunks;
      els.audioBuffer.textContent = Math.max(0, Math.round((nextPlaybackTime - now) * 1000)) + ' ms';
    }
    async function connect() {
      els.connectBtn.disabled = true; setStatus('Connessione...');
      outputContext = outputContext || new AudioContext({ sampleRate: 24000 });
      outputGain = outputContext.createGain(); outputGain.connect(outputContext.destination);
      await outputContext.resume(); await applyOutputDevice();
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/palabra-visitor-ws`);
      ws.binaryType = 'arraybuffer';
      ws.onopen = () => { els.disconnectBtn.disabled = false; setStatus('Connesso - in attesa della guida', 'live'); };
      ws.onmessage = event => {
        if (event.data instanceof ArrayBuffer) { scheduleAudio(event.data); return; }
        const msg = JSON.parse(event.data);
        if (msg.type === 'visitor-connected') { els.visitors.textContent = msg.visitors; log('Connesso', msg); }
        else if (msg.type === 'tour-started') { setStatus('Live - audio tradotto in arrivo', 'live'); log('Tour avviato', msg); }
        else if (msg.type === 'tour-stopped' || msg.type === 'guide-disconnected') { setStatus('In attesa della guida'); log('Tour fermo', msg); }
        else if (msg.type === 'palabra-message') log('Messaggio Palabra', msg.message);
        else log('Evento', msg);
      };
      ws.onclose = () => { els.disconnectBtn.disabled = true; els.connectBtn.disabled = false; setStatus('Disconnesso'); log('WebSocket chiuso'); };
      ws.onerror = () => { setStatus('Errore WebSocket', 'error'); log('Errore WebSocket'); };
    }
    function disconnect() {
      els.disconnectBtn.disabled = true; els.connectBtn.disabled = false;
      if (ws) ws.close(); ws = null; setStatus('Pronto');
    }
    els.connectBtn.onclick = () => connect().catch(e => { setStatus(e.message, 'error'); log('Errore', { message: e.message }); els.connectBtn.disabled = false; });
    els.disconnectBtn.onclick = disconnect;
    els.refreshBtn.onclick = () => refreshOutputs(true).catch(e => log('Errore output', { message: e.message }));
    els.testBtn.onclick = () => testOutput().catch(e => log('Test cuffie fallito', { message: e.message }));
    els.speakerDevice.onchange = () => applyOutputDevice().catch(e => log('Output non applicato', { message: e.message }));
    window.addEventListener('beforeunload', disconnect);
    refreshOutputs(false).catch(() => {});
  </script>
</body>
</html>
