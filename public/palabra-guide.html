<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palabra Guida</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; padding: 24px; background: #fff7ed; color: #172033; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    main { max-width: 920px; margin: 0 auto; display: grid; gap: 18px; }
    .panel { background: #fff; border: 1px solid #fed7aa; border-radius: 8px; padding: 18px; box-shadow: 0 12px 32px rgba(154, 52, 18, 0.08); }
    h1 { font-size: 26px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    label { display: grid; gap: 6px; color: #4b5563; font-size: 13px; font-weight: 650; }
    select { min-height: 42px; padding: 9px 11px; border: 1px solid #fdba74; border-radius: 6px; background: #fff; color: #111827; font: inherit; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button { min-height: 42px; padding: 0 16px; border: 0; border-radius: 6px; cursor: pointer; font: inherit; font-weight: 750; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .primary { background: #ea580c; color: #fff; }
    .danger { background: #dc2626; color: #fff; }
    .secondary { background: #ffedd5; color: #9a3412; }
    .status { margin-top: 14px; padding: 11px 12px; border-radius: 6px; background: #f3f4f6; color: #4b5563; font-weight: 650; }
    .status.live { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .meters { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: 14px; }
    .meter { padding: 12px; border-radius: 8px; background: #fff7ed; border: 1px solid #fed7aa; }
    .meter span { display: block; color: #9a3412; font-size: 12px; text-transform: uppercase; margin-bottom: 4px; }
    .meter strong { font-size: 18px; color: #0f172a; }
    .log { height: 260px; overflow: auto; padding: 12px; border-radius: 8px; background: #0f172a; color: #dbeafe; font-family: Consolas, "Courier New", monospace; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
    @media (max-width: 820px) { body { padding: 16px; } .grid, .meters { grid-template-columns: 1fr; } .controls { flex-direction: column; } button { width: 100%; } }
  </style>
</head>
<body>
  <main>
    <h1>Palabra Guida</h1>
    <section class="panel">
      <div class="grid">
        <label>Guida parla<select id="sourceLang"><option value="it" selected>Italiano</option><option value="en">English</option><option value="es">Espanol</option><option value="fr">Francais</option><option value="de">Deutsch</option></select></label>
        <label>Traduci in<select id="targetLang"><option value="en-us" selected>English US</option><option value="it">Italiano</option><option value="es">Espanol</option><option value="fr">Francais</option><option value="de">Deutsch</option></select></label>
        <label>Voce<select id="voiceId"><option value="default_low" selected>Default low</option><option value="default_high">Default high</option></select></label>
        <label>Microfono<input-device></input-device><select id="micDevice"><option value="">Default sistema</option></select></label>
      </div>
      <div class="controls">
        <button class="primary" id="startBtn">Avvia tour</button>
        <button class="danger" id="stopBtn" disabled>Stop</button>
        <button class="secondary" id="refreshBtn">Aggiorna microfoni</button>
      </div>
      <div class="status" id="status">Pronto</div>
      <div class="meters">
        <div class="meter"><span>Microfono</span><strong id="micLevel">0%</strong></div>
        <div class="meter"><span>Visitatori</span><strong id="visitors">0</strong></div>
        <div class="meter"><span>Input chunks</span><strong id="inputChunks">0</strong></div>
        <div class="meter"><span>Output chunks</span><strong id="outputChunks">0</strong></div>
      </div>
    </section>
    <section class="panel"><div class="log" id="log"></div></section>
  </main>

  <script>
    const els = {
      sourceLang: document.getElementById('sourceLang'),
      targetLang: document.getElementById('targetLang'),
      voiceId: document.getElementById('voiceId'),
      micDevice: document.getElementById('micDevice'),
      startBtn: document.getElementById('startBtn'),
      stopBtn: document.getElementById('stopBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
      status: document.getElementById('status'),
      micLevel: document.getElementById('micLevel'),
      visitors: document.getElementById('visitors'),
      inputChunks: document.getElementById('inputChunks'),
      outputChunks: document.getElementById('outputChunks'),
      log: document.getElementById('log')
    };
    let ws = null, stream = null, context = null, source = null, processor = null, meterTimer = null;
    let inputChunks = 0, outputChunks = 0, meterLevel = 0;
    function setStatus(text, cls = '') { els.status.textContent = text; els.status.className = 'status' + (cls ? ' ' + cls : ''); }
    function log(message, data = null) { const now = new Date().toLocaleTimeString(); els.log.textContent = `${now} ${message}${data ? '\n' + JSON.stringify(data, null, 2) : ''}\n\n` + els.log.textContent; }
    function downsampleTo16k(float32, sourceRate) {
      if (sourceRate === 16000) return float32;
      const ratio = sourceRate / 16000, length = Math.floor(float32.length / ratio), out = new Float32Array(length);
      for (let i = 0; i < length; i++) {
        const start = Math.floor(i * ratio), end = Math.min(float32.length, Math.floor((i + 1) * ratio));
        let sum = 0; for (let j = start; j < end; j++) sum += float32[j];
        out[i] = sum / Math.max(1, end - start);
      }
      return out;
    }
    function floatToPcm16(float32) {
      const buffer = new ArrayBuffer(float32.length * 2), view = new DataView(buffer);
      for (let i = 0; i < float32.length; i++) { const s = Math.max(-1, Math.min(1, float32[i])); view.setInt16(i * 2, s < 0 ? s * 32768 : s * 32767, true); }
      return buffer;
    }
    async function refreshMics(requestPermission = false) {
      if (requestPermission) { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); s.getTracks().forEach(t => t.stop()); }
      const devices = await navigator.mediaDevices.enumerateDevices();
      const current = els.micDevice.value;
      els.micDevice.innerHTML = '<option value="">Default sistema</option>';
      devices.filter(d => d.kind === 'audioinput').forEach((d, i) => {
        const opt = document.createElement('option'); opt.value = d.deviceId; opt.textContent = d.label || `Microfono ${i + 1}`; els.micDevice.appendChild(opt);
      });
      if ([...els.micDevice.options].some(o => o.value === current)) els.micDevice.value = current;
      log('Microfoni aggiornati', { count: els.micDevice.options.length - 1 });
    }
    async function startMic() {
      const audio = { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true };
      if (els.micDevice.value) audio.deviceId = { exact: els.micDevice.value };
      stream = await navigator.mediaDevices.getUserMedia({ audio });
      await refreshMics(false);
      context = new AudioContext();
      source = context.createMediaStreamSource(stream);
      processor = context.createScriptProcessor(4096, 1, 1);
      source.connect(processor); processor.connect(context.destination);
      processor.onaudioprocess = event => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const input = event.inputBuffer.getChannelData(0);
        let sum = 0; for (const sample of input) sum += sample * sample;
        meterLevel = Math.min(100, Math.round(Math.sqrt(sum / input.length) * 260));
        ws.send(floatToPcm16(downsampleTo16k(input, context.sampleRate)));
        inputChunks++; els.inputChunks.textContent = inputChunks;
      };
      meterTimer = setInterval(() => { els.micLevel.textContent = meterLevel + '%'; }, 120);
      setStatus('Live - parla nel microfono', 'live');
      log('Microfono attivo', { sampleRate: context.sampleRate });
    }
    async function start() {
      els.startBtn.disabled = true; setStatus('Connessione...');
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/palabra-guide-ws`);
      ws.onopen = () => ws.send(JSON.stringify({ type: 'start', sourceLanguage: els.sourceLang.value, targetLanguage: els.targetLang.value, voiceId: els.voiceId.value }));
      ws.onmessage = event => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'ready') { log('Palabra pronta', msg); els.stopBtn.disabled = false; startMic().catch(e => { setStatus(e.message, 'error'); log('Errore microfono', { message: e.message }); }); }
        else if (msg.type === 'visitor-count') els.visitors.textContent = msg.visitors;
        else if (msg.type === 'palabra-message') log('Messaggio Palabra', msg.message);
        else if (msg.type === 'audio-last-chunk' || msg.type === 'palabra-close' || msg.type === 'stopped') { outputChunks = msg.outboundChunks ?? outputChunks; els.outputChunks.textContent = outputChunks; log('Evento', msg); }
        else if (msg.type === 'error') { setStatus(msg.error, 'error'); log('Errore', msg); }
        else log('Evento', msg);
      };
      ws.onclose = () => { log('WebSocket chiuso'); if (!els.stopBtn.disabled) setStatus('Disconnesso'); };
      ws.onerror = () => { setStatus('Errore WebSocket', 'error'); log('Errore WebSocket'); };
    }
    async function stop() {
      els.stopBtn.disabled = true; els.startBtn.disabled = false;
      if (meterTimer) clearInterval(meterTimer);
      if (processor) processor.disconnect();
      if (source) source.disconnect();
      if (context) await context.close().catch(() => {});
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'stop' }));
      if (ws) ws.close();
      ws = stream = context = source = processor = null;
      setStatus('Pronto');
    }
    els.startBtn.onclick = start;
    els.stopBtn.onclick = stop;
    els.refreshBtn.onclick = () => refreshMics(true).catch(e => log('Errore microfoni', { message: e.message }));
    window.addEventListener('beforeunload', () => stop());
    refreshMics(false).catch(() => {});
  </script>
</body>
</html>
