<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palabra - Test tecnico</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      background: #eef2f7;
      color: #172033;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      font-size: 26px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 6px;
      background: #dbeafe;
      color: #1e40af;
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
    }

    .panel {
      background: #fff;
      border: 1px solid #d8dee9;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #4b5563;
      font-size: 13px;
      font-weight: 650;
    }

    select,
    input {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      color: #111827;
      font: inherit;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      min-height: 42px;
      padding: 0 16px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      background: #2563eb;
      color: #fff;
    }

    .danger {
      background: #dc2626;
      color: #fff;
    }

    .secondary {
      background: #e5e7eb;
      color: #1f2937;
    }

    .status {
      margin-top: 14px;
      padding: 11px 12px;
      border-radius: 6px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 14px;
      font-weight: 650;
    }

    .status.live {
      background: #dcfce7;
      color: #166534;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .meters {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .meter {
      padding: 12px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .meter span {
      display: block;
      color: #64748b;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .meter strong {
      font-size: 18px;
      color: #0f172a;
    }

    audio {
      width: 100%;
      margin-top: 14px;
    }

    .log {
      height: 260px;
      overflow: auto;
      padding: 12px;
      border-radius: 8px;
      background: #0f172a;
      color: #dbeafe;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    @media (max-width: 820px) {
      body { padding: 16px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .grid, .meters { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <h1>Palabra - Test tecnico</h1>
      <div class="badge">Pagina isolata</div>
    </div>

    <section class="panel">
      <div class="grid">
        <label>
          Lingua parlata
          <select id="sourceLang">
            <option value="auto">Auto</option>
            <option value="it" selected>Italiano</option>
            <option value="en">English</option>
            <option value="en-us">English US</option>
            <option value="es">Espanol</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="pt">Portugues</option>
          </select>
        </label>
        <label>
          Lingua tradotta
          <select id="targetLang">
            <option value="en-us" selected>English US</option>
            <option value="en">English</option>
            <option value="it">Italiano</option>
            <option value="es">Espanol</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="pt">Portugues</option>
          </select>
        </label>
        <label>
          Voce
          <select id="voiceId">
            <option value="default_low" selected>Default low</option>
            <option value="default_high">Default high</option>
          </select>
        </label>
        <label>
          Buffer desiderato
          <input id="queueMs" type="number" min="500" max="12000" step="250" value="3500">
        </label>
        <label>
          Microfono input
          <select id="micDevice">
            <option value="">Default sistema</option>
          </select>
        </label>
        <label>
          Cuffie output
          <select id="speakerDevice">
            <option value="">Default sistema</option>
          </select>
        </label>
      </div>

      <div class="controls">
        <button class="primary" id="startBtn">Avvia test</button>
        <button class="danger" id="stopBtn" disabled>Stop</button>
        <button class="secondary" id="refreshDevicesBtn">Aggiorna dispositivi</button>
        <button class="secondary" id="testOutputBtn">Prova cuffie</button>
        <button class="secondary" id="clearBtn">Pulisci log</button>
      </div>

      <div class="status" id="status">Pronto</div>

      <div class="meters">
        <div class="meter">
          <span>Sessione</span>
          <strong id="sessionId">-</strong>
        </div>
        <div class="meter">
          <span>Audio remoto</span>
          <strong id="remoteTracks">0</strong>
        </div>
        <div class="meter">
          <span>Messaggi</span>
          <strong id="messageCount">0</strong>
        </div>
        <div class="meter">
          <span>Microfono</span>
          <strong id="micLevel">0%</strong>
        </div>
      </div>

      <audio id="remoteAudio" autoplay playsinline controls></audio>
    </section>

    <section class="panel">
      <div class="log" id="log"></div>
    </section>
  </main>

  <script type="module">
    import {
      LocalAudioTrack,
      Room,
      RoomEvent
    } from 'https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.esm.mjs';

    const els = {
      sourceLang: document.getElementById('sourceLang'),
      targetLang: document.getElementById('targetLang'),
      voiceId: document.getElementById('voiceId'),
      queueMs: document.getElementById('queueMs'),
      micDevice: document.getElementById('micDevice'),
      speakerDevice: document.getElementById('speakerDevice'),
      startBtn: document.getElementById('startBtn'),
      stopBtn: document.getElementById('stopBtn'),
      refreshDevicesBtn: document.getElementById('refreshDevicesBtn'),
      testOutputBtn: document.getElementById('testOutputBtn'),
      clearBtn: document.getElementById('clearBtn'),
      status: document.getElementById('status'),
      sessionId: document.getElementById('sessionId'),
      remoteTracks: document.getElementById('remoteTracks'),
      messageCount: document.getElementById('messageCount'),
      micLevel: document.getElementById('micLevel'),
      remoteAudio: document.getElementById('remoteAudio'),
      log: document.getElementById('log')
    };

    let room = null;
    let micStream = null;
    let localTrack = null;
    let session = null;
    let remoteTrackCount = 0;
    let dataMessageCount = 0;
    let remoteAudioTimeout = null;
    let micAudioContext = null;
    let micMeterTimer = null;

    function setStatus(text, cls = '') {
      els.status.textContent = text;
      els.status.className = 'status' + (cls ? ' ' + cls : '');
    }

    function log(message, data = null) {
      const now = new Date().toLocaleTimeString();
      const line = data ? `${now} ${message}\n${JSON.stringify(data, null, 2)}` : `${now} ${message}`;
      els.log.textContent = line + '\n\n' + els.log.textContent;
    }

    function setSelectOptions(selectEl, devices, fallbackLabel) {
      const current = selectEl.value;
      selectEl.innerHTML = `<option value="">${fallbackLabel}</option>`;
      devices.forEach((device, index) => {
        const option = document.createElement('option');
        option.value = device.deviceId;
        option.textContent = device.label || `${fallbackLabel} ${index + 1}`;
        selectEl.appendChild(option);
      });
      if ([...selectEl.options].some(option => option.value === current)) {
        selectEl.value = current;
      }
    }

    async function refreshDevices(requestPermission = false) {
      try {
        if (requestPermission) {
          const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          tempStream.getTracks().forEach(track => track.stop());
        }
        const devices = await navigator.mediaDevices.enumerateDevices();
        setSelectOptions(
          els.micDevice,
          devices.filter(device => device.kind === 'audioinput'),
          'Default sistema'
        );
        setSelectOptions(
          els.speakerDevice,
          devices.filter(device => device.kind === 'audiooutput'),
          'Default sistema'
        );
        log('Dispositivi aggiornati', {
          microphones: els.micDevice.options.length - 1,
          outputs: els.speakerDevice.options.length - 1,
          outputSelectionSupported: typeof els.remoteAudio.setSinkId === 'function'
        });
      } catch (error) {
        log('Impossibile leggere i dispositivi audio', { message: error.message });
      }
    }

    async function applyOutputDevice(mediaEl = els.remoteAudio) {
      if (!els.speakerDevice.value) return;
      if (typeof mediaEl.setSinkId !== 'function') {
        log('Selezione cuffie non supportata da questo browser');
        return;
      }
      await mediaEl.setSinkId(els.speakerDevice.value);
      log('Output audio selezionato', { deviceId: els.speakerDevice.value });
    }

    function createToneUrl() {
      const sampleRate = 44100;
      const durationSeconds = 0.45;
      const samples = Math.floor(sampleRate * durationSeconds);
      const buffer = new ArrayBuffer(44 + samples * 2);
      const view = new DataView(buffer);
      const writeString = (offset, value) => {
        for (let i = 0; i < value.length; i++) view.setUint8(offset + i, value.charCodeAt(i));
      };
      writeString(0, 'RIFF');
      view.setUint32(4, 36 + samples * 2, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, samples * 2, true);
      for (let i = 0; i < samples; i++) {
        const envelope = Math.min(1, i / 2000, (samples - i) / 2000);
        const sample = Math.sin(2 * Math.PI * 880 * i / sampleRate) * 0.28 * envelope;
        view.setInt16(44 + i * 2, sample * 32767, true);
      }
      return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
    }

    async function testOutput() {
      const audio = new Audio(createToneUrl());
      audio.volume = 0.8;
      await applyOutputDevice(audio);
      await audio.play();
      log('Tono test inviato alle cuffie');
    }

    function buildTranslationSettings() {
      const desiredQueueMs = Math.max(500, Math.min(12000, Number(els.queueMs.value) || 3500));
      const sourceLanguage = els.sourceLang.value;
      return {
        input_stream: {
          content_type: 'audio',
          source: { type: 'webrtc' }
        },
        output_stream: {
          content_type: 'audio',
          target: { type: 'webrtc' }
        },
        pipeline: {
          transcription: {
            source_language: sourceLanguage,
            detectable_languages: sourceLanguage === 'auto' ? ['it', 'en', 'en-us', 'es', 'fr', 'de', 'pt'] : [],
            segment_confirmation_silence_threshold: 0.7,
            sentence_splitter: { enabled: true },
            verification: {
              auto_transcription_correction: false,
              transcription_correction_style: null
            }
          },
          translations: [
            {
              target_language: els.targetLang.value,
              translate_partial_transcriptions: false,
              speech_generation: {
                voice_cloning: false,
                voice_id: els.voiceId.value,
                voice_timbre_detection: {
                  enabled: false,
                  high_timbre_voices: ['default_high'],
                  low_timbre_voices: ['default_low']
                }
              }
            }
          ],
          translation_queue_configs: {
            global: {
              desired_queue_level_ms: desiredQueueMs,
              max_queue_level_ms: 20000,
              auto_tempo: true,
              min_tempo: 1.15,
              max_tempo: 1.45
            }
          },
          allowed_message_types: [
            'translated_transcription',
            'partial_transcription',
            'partial_translated_transcription',
            'validated_transcription'
          ]
        }
      };
    }

    function publishTask() {
      const payload = {
        message_type: 'set_task',
        data: buildTranslationSettings()
      };
      const message = new TextEncoder().encode(JSON.stringify(payload));
      room.localParticipant.publishData(message, { reliable: true });
      log('Impostazioni traduzione inviate', payload.data);
    }

    async function createPalabraSession() {
      const response = await fetch('/api/palabra/session', { method: 'POST' });
      const payload = await response.json().catch(() => null);
      if (!response.ok || !payload?.ok) {
        throw new Error(payload?.error || 'Creazione sessione Palabra fallita');
      }
      return payload.data;
    }

    async function start() {
      try {
        els.startBtn.disabled = true;
        setStatus('Creazione sessione Palabra...');

        session = await createPalabraSession();
        els.sessionId.textContent = session.id ? session.id.slice(0, 8) : '-';
        log('Sessione creata', {
          id: session.id,
          room: session.webrtc_room_name,
          webrtc_url: session.webrtc_url
        });

        setStatus('Connessione WebRTC...');
        room = new Room({ adaptiveStream: false, dynacast: false });

        room.on(RoomEvent.TrackSubscribed, (track, publication) => {
          if (track.kind !== 'audio') return;
          if (remoteAudioTimeout) {
            clearTimeout(remoteAudioTimeout);
            remoteAudioTimeout = null;
          }
          remoteTrackCount++;
          els.remoteTracks.textContent = remoteTrackCount;
          const mediaStreamTrack = track.mediaStreamTrack;
          els.remoteAudio.srcObject = new MediaStream([mediaStreamTrack]);
          applyOutputDevice().catch(err => log('Output cuffie non applicato', { message: err.message }));
          els.remoteAudio.play().catch(err => log('Playback audio bloccato dal browser', { message: err.message }));
          log('Audio tradotto ricevuto', { track: publication.trackName || publication.name || 'audio' });
        });

        room.on(RoomEvent.DataReceived, (payload) => {
          dataMessageCount++;
          els.messageCount.textContent = dataMessageCount;
          const text = new TextDecoder().decode(payload);
          try {
            log('Messaggio Palabra', JSON.parse(text));
          } catch {
            log('Messaggio Palabra', { raw: text });
          }
        });

        room.on(RoomEvent.Disconnected, () => {
          setStatus('Disconnesso');
          log('Room disconnessa');
        });

        await room.connect(session.webrtc_url, session.publisher, { autoSubscribe: true });
        log('Connesso alla room');

        setStatus('Attivazione microfono...');
        const audioConstraints = {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
        };
        if (els.micDevice.value) {
          audioConstraints.deviceId = { exact: els.micDevice.value };
        }
        micStream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });
        await refreshDevices(false);
        startMicMeter(micStream);
        localTrack = new LocalAudioTrack(micStream.getAudioTracks()[0]);
        await room.localParticipant.publishTrack(localTrack, {
          dtx: false,
          red: false,
          audioPreset: {
            maxBitrate: 32000,
            priority: 'high'
          }
        });
        log('Microfono pubblicato');

        publishTask();
        remoteAudioTimeout = setTimeout(() => {
          if (remoteTrackCount === 0) {
            log('Nessun audio tradotto ricevuto dopo 12 secondi', {
              hint: 'Controlla lingua parlata/tradotta, permesso microfono e log Palabra.'
            });
          }
        }, 12000);
        els.stopBtn.disabled = false;
        setStatus('Live - parla nel microfono', 'live');
      } catch (error) {
        log('Errore', { message: error.message });
        setStatus(error.message, 'error');
        await stop(false);
      }
    }

    function startMicMeter(stream) {
      stopMicMeter();
      micAudioContext = new AudioContext();
      const source = micAudioContext.createMediaStreamSource(stream);
      const analyser = micAudioContext.createAnalyser();
      analyser.fftSize = 1024;
      source.connect(analyser);
      const data = new Uint8Array(analyser.fftSize);
      micMeterTimer = setInterval(() => {
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (const value of data) {
          const centered = value - 128;
          sum += centered * centered;
        }
        const rms = Math.sqrt(sum / data.length);
        const level = Math.min(100, Math.round(rms * 4));
        els.micLevel.textContent = level + '%';
      }, 120);
    }

    function stopMicMeter() {
      if (micMeterTimer) {
        clearInterval(micMeterTimer);
        micMeterTimer = null;
      }
      if (micAudioContext) {
        micAudioContext.close().catch(() => {});
        micAudioContext = null;
      }
      els.micLevel.textContent = '0%';
    }

    async function stop(deleteRemoteSession = true) {
      els.stopBtn.disabled = true;
      els.startBtn.disabled = false;

      try {
        if (room?.localParticipant) {
          const message = new TextEncoder().encode(JSON.stringify({ message_type: 'end_task', data: {} }));
          room.localParticipant.publishData(message, { reliable: true });
        }
      } catch (_e) {}

      if (localTrack) {
        try { localTrack.stop(); } catch (_e) {}
        localTrack = null;
      }
      if (micStream) {
        micStream.getTracks().forEach(track => track.stop());
        micStream = null;
      }
      stopMicMeter();
      if (room) {
        try { room.disconnect(); } catch (_e) {}
        room = null;
      }
      els.remoteAudio.srcObject = null;
      if (remoteAudioTimeout) {
        clearTimeout(remoteAudioTimeout);
        remoteAudioTimeout = null;
      }

      if (deleteRemoteSession && session?.id) {
        fetch(`/api/palabra/session/${encodeURIComponent(session.id)}`, { method: 'DELETE' }).catch(() => {});
      }

      session = null;
      remoteTrackCount = 0;
      dataMessageCount = 0;
      els.remoteTracks.textContent = '0';
      els.messageCount.textContent = '0';
      els.sessionId.textContent = '-';
      setStatus('Pronto');
    }

    els.startBtn.onclick = start;
    els.stopBtn.onclick = () => stop(true);
    els.refreshDevicesBtn.onclick = () => refreshDevices(true);
    els.testOutputBtn.onclick = () => testOutput().catch(error => log('Test cuffie fallito', { message: error.message }));
    els.speakerDevice.onchange = () => applyOutputDevice().catch(error => log('Output cuffie non applicato', { message: error.message }));
    els.clearBtn.onclick = () => { els.log.textContent = ''; };
    window.addEventListener('beforeunload', () => { stop(true); });
    refreshDevices(false);
  </script>
</body>
</html>
